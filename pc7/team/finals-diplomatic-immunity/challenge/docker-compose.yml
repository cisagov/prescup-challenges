x-challenge:
  name: "Diplomatic Immunity"
  description: |
    # Diplomatic Immunity

    The identity of an embedded field agent (callsign **Kabal**) has been compromised while operating under diplomatic cover. To extract her safely, your team must forge a complete embassy document trail that will legitimize her departure on an official diplomatic transport. 

    **NICE Work Roles**

    - [Cyber Defense Analyst](https://niccs.cisa.gov/tools/nice-framework)
    - [Exploitation Analyst](https://niccs.cisa.gov/tools/nice-framework)

    **NICE Tasks**

    - [T0028](https://niccs.cisa.gov/tools/nice-framework) – Conduct and/or support authorized penetration testing on enterprise network assets.
    - [T0566](https://niccs.cisa.gov/tools/nice-framework) – Analyze internal operational architecture, tools, and procedures for ways to improve performance.

    ## Background

    The embassy's secure signing infrastructure has been fragmented by the adversary. Each subsystem holds a critical component of the ambassador's digital signature chain (access logs, surveillance evidence, mail headers, key shards, and a signing vault). You must recover and reassemble the Ambassador's Final Clearance Key — a cryptographic signature used to authorize a diplomatic transfer.

    ## Getting Started

    We recommend investigating the surveillance endpoint to begin. The hostname and port for this service can be found in the `System and Tool Credentials` section.

    ### Tool Recommendation

    The following tools may be of use to your agency during this engagement:

    ```bash
    csplit, ffmpeg, gpg, jq, munpack, tesseract-ocr, xxd
    ```

    ## Tokens

    ### Formatting
    The standard formatting for valid tokens for this challenge will appear in `placeholders` within the Question section of the Challenge Description (in the sidebar on the left).

    ### Exceptions

    #### Token Reliance
    Tokens 1, 2, and 3 can be completed in any order. Token 4 relies on the completion of Tokens 1–3, and Token 5 can only be obtained once challengers have all four preceding tokens.

    #### Question 2 (Variant)
    When obtaining a specific passphrase, you may find it spaced out due to how the video artifact must be processed. The correct format will be: `XXXXXXX-YYYYYY-ZZ`
    Here's an example of sample output that needs to be corrected: `WORD- WORD - DIGITS`
    In this case, the correct passphrase would be `WORD-WORD-DIGITS`.

    #### Question 3 (Decoys)
    Some recovered artifacts may decrypt successfully but are intentionally labeled as `decoys`.  Understanding the Shamir Secret Sharing algorithm will help identify which artifacts are valid shares.

    #### Question 4 (The Algorithm)
    To begin, please use the following instructions as a general guide:

    * Use Token 1, Token 2, and Token 3 to retrieve the three gated RSA private-key fragments from the `Classified Archive` service. Each fragment is protected by a separate endpoint and is released only when the correct token is supplied in the `X-Frag` header:

    ```bash
    curl -fsS http://archive.embassy.svc:8080/export/shareA -H "X-Frag: <TOKEN1>" -o shareA.bin
    curl -fsS http://archive.embassy.svc:8080/export/shareB -H "X-Frag: <TOKEN2>" -o shareB.bin
    curl -fsS http://archive.embassy.svc:8080/export/shareC -H "X-Frag: <TOKEN3>" -o shareC.bin
    ```

    Additional guidance can be found in the Questions section of the Description in the side panel of this challenge.

    ## Scoring

    There are five tokens (important):
    * Tokens `1`, `2`, and `3` may be completed in any order.  
    * `TOKEN4` requires the completion of `Tokens 1–3`. 
    * `TOKEN5` can only be obtained after recovering `TOKEN1–4`.

    ## System and Tool Credentials

    This table documents the service hostnames and locations:

    |system/tool|hostname|protocol|
    |----|---|---|
    |logger|`logger.embassy.svc:8080`|tcp|
    |surveillance|`surveillance.embassy.svc:8080`|tcp|
    |intel|`intel.embassy.svc:8080`|tcp|
    |classified-archive|`archive.embassy.svc:8080`|tcp|
    |api-vault|`api-vault.embassy.svc:8443`|https|

    ## Note

    Do not attempt to attack or breach the Challenge Platform. You may only perform the tasks assigned on the provided scope. Not everything that looks like an artifact is relevant. Use cross-correlation across services to succeed.

  icon: "TbPaper"
  summary: "Bring Agent Kabal home by forging a complete embassy document trail that will legitimize her departure on an official diplomatic transport."
  tags:
    - season:pc7
    - track:teams
    - round:finals
    - role:defensive-cybersecurity
    - role:exploitation-analyst
    - topics:forensics
    - topics:cryptography
  variables:
    token1:
      template: "fake.bothify('PCCC{DI-?#?#?#??}')"
      default: &token1 "PCCC{DI-AGENT004}"
    token2:
      template: "fake.bothify('PCCC{DI-?#?#?#??}')"
      default: &token2 "PCCC{DI-AGENT015}"
    token3:
      template: "fake.bothify('PCCC{DI-?#?#?#??}')"
      default: &token3 "PCCC{DI-AGENT07}"  
    token4:
      template: "fake.bothify('PCCC{DI-?#?#?#??}')"
      default: &token4 "PCCC{DI-AGENT090}"
    token5: 
      template: "fake.bothify('PCCC{DI-?#?#?#??}')"
      default: &token5 "PCCC{DI-AGENT010}"

  questions:
    - name: Token 1 - Serial Number, please?
      body: From the `Logger` asset, recover and decode the serial from the certificate used by the Agency for "events" (emergency situations) in which diplomatic immunity processing must be done quickly.
      answer: *token1
      points: 1026 # ~19.5% of 5130
      max_attempts: 3
      placeholder: "PCCC{XX-YYYYYYYY}"

    - name: Token 2 - Always Watching
      body: Harvest a `surveillance` footage frame that contains the passphrase fragment proving the ambassador's visible approval element. Use it to extract the zip from the Camellia-CBC encrypted file.
      answer: *token2
      points: 1026 # ~19.5% of 5130
      max_attempts: 3
      placeholder: "PCCC{XX-YYYYYYYY}"

    - name: Token 3 - GOST Signatures
      body: On the `Intel` asset, the mail server stores a GOST-signed S/MIME message containing Shamir's Secret Sharing algorithm shards. These shards are needed to reconstruct a key required to forge Kabal's immunity papers.
      answer: *token3
      points: 1489 # ~29% of 5130
      max_attempts: 3
      placeholder: "PCCC{XX-YYYYYYYY}"

    - name: Token 4 - Privacy
      body: From the `Classified Archives`, recover the ambassador's private signing capability from distributed fragments. Download the files hosted on the `artifacts` endpoint and analyze them. The archive is encrypted with a symmetric key that is itself protected and cannot be accessed directly. Reconstruct the fragmented private key material, use it to recover the symmetric key, and decrypt the archive to obtain Token 4.
      answer: *token4
      points: 1089 # ~21% of 5130
      max_attempts: 3
      placeholder: "PCCC{XX-YYYYYYYY}"

    - name: Token 5 - Immunity
      body: From the `API Vault`, finalize the ambassador’s authorization process for Agent Kabal. The vault requires proof that you possess the ambassador’s event credential recovered earlier in the operation. Using the event certificate from Token 1, the reconstructed private key from Token 4, and the values from Tokens 1–4, submit an authenticated request to the authorization (reinstate) endpoint to receive the final clearance key.
      answer: *token5
      points: 500 # ~9% of 5130 
      max_attempts: 3
      placeholder: "PCCC{XX-YYYYYYYY}"

services:
  logger:
    build:
      context: ./logger
      dockerfile: Dockerfile
    hostname: logger.embassy.svc
    environment:
      TOKEN1: *token1
      TOKEN1_PKI_SCHEME: brainpool
      LOG_NOISE: high
    networks:
      - competitor_net

  surveillance:
    build:
      context: ./surveillance
      dockerfile: Dockerfile
    hostname: surveillance.embassy.svc
    environment:
      TOKEN2: *token2
    networks:
      - competitor_net

  intel:
    build:
      context: ./intel
      dockerfile: Dockerfile
    hostname: intel.embassy.svc
    environment:
      TOKEN3: *token3
    networks:
      - competitor_net

  archive:
    build:
      context: ./archive
      dockerfile: Dockerfile
    hostname: archive.embassy.svc
    environment:
      TOKEN1: *token1
      TOKEN2: *token2
      TOKEN3: *token3
      TOKEN4: *token4
    networks:
      - competitor_net

  vault:
    build:
      context: ./vault
      dockerfile: Dockerfile
    hostname: api-vault.embassy.svc
    environment:
      TOKEN1: *token1
      TOKEN2: *token2
      TOKEN3: *token3
      TOKEN4: *token4
      TOKEN5: *token5
    networks:
      - competitor_net

  diag:
    build:
      context: ./diag
      dockerfile: Dockerfile
    hostname: diag.embassy.svc
    environment:
      DIAG_START_DELAY_SECONDS: "15"
      TOKEN1: *token1
      TOKEN2: *token2
      TOKEN3: *token3
      TOKEN4: *token4
      TOKEN5: *token5
    networks:
      - competitor_net

  challengeserver: 
    build: ../../../prescup-challenge-server/challenge-server
    hostname: challenge.pccc
    networks:
        - competitor_net
    cap_add:
        - NET_ADMIN
    environment:
        pc_year: "7"
        challenge_name: Diplomatic Immunity

networks:
  competitor_net:
    internal: true