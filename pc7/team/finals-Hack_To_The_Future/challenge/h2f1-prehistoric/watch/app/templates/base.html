<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time Watch</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

    <style>
        :root {
            --watch-bg: #0b1220;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-dim: rgba(255, 255, 255, 0.75);
            --good: #19c37d;
            --danger: #ff4d4d;
        }

        body {
            background: radial-gradient(1000px 600px at 50% 0%, #132042 0%, var(--watch-bg) 55%);
            color: #fff;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 12px;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        .watch {
            width: min(420px, 100%);
            border-radius: 28px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .brand {
            font-weight: 700;
            letter-spacing: 0.2px;
            font-size: 1.15rem;
        }

        .status {
            display: grid;
            gap: 6px;
            text-align: right;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .status-line {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
            white-space: nowrap;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--good);
            box-shadow: 0 0 0 2px rgba(25, 195, 125, 0.2), 0 0 18px rgba(25, 195, 125, 0.55);
            flex: 0 0 auto;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 12px;
        }

        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .feed-title {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.88);
        }

        .rec {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.80);
            user-select: none;
        }

        .rec-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--danger);
            box-shadow: 0 0 0 2px rgba(255, 77, 77, 0.18);
            animation: pulse 1.15s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.65;
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.35);
            }

            70% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 0 10px rgba(255, 77, 77, 0.0);
            }

            100% {
                transform: scale(0.9);
                opacity: 0.65;
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.0);
            }
        }

        .feed-box {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(0, 0, 0, 0.25);
        }

        .feed-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .meta {
            margin-top: 12px;
            display: grid;
            gap: 8px;
            font-size: 0.88rem;
            color: var(--text-dim);
        }

        .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .meta-row strong {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 650;
        }

        .actions {
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .btn-watch {
            padding: 14px 14px;
            font-weight: 700;
            border-radius: 18px;
            font-size: 1.0rem;
            letter-spacing: 0.2px;
        }

        .btn-watch:active {
            transform: translateY(1px);
        }

        .hint {
            margin-top: 10px;
            text-align: center;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.55);
        }

        .chat {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-size: 0.9rem;
        }

        .msg-sent {
            align-self: flex-end;
            text-align: right;
        }

        .msg-recv {
            align-self: flex-start;
        }

        .bubble {
            padding: 8px 12px;
            border-radius: 14px;
            line-height: 1.3;
        }

        .msg-sent .bubble {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-recv .bubble {
            background: rgba(255, 255, 255, 0.12);
            border-bottom-left-radius: 4px;
        }

        .msg .meta {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 0;
        }

        .bubble a {
            color: #9ecbff;
            text-decoration: underline;
            word-break: break-all;
        }

        .msg-sent .bubble a {
            color: #d6e6ff;
        }

        .chat-scroll {
            height: 260px;
            /* smartwatch-friendly */
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Optional: cleaner scrollbar */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body>
    <main class="watch">
        <div class="topbar">
            <div class="brand">Time Watch</div>

            <div class="status">
                <div class="status-line"><span class="dot"></span><span>Time Anchor connected</span></div>
                <div class="status-line"><span class="dot"></span><span>Time Device connected</span></div>
            </div>
        </div>

        <section class="panel">
            {% block content %}{% endblock %}
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
