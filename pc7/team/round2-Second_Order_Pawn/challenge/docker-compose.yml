      secretKey: LqkLm2WrMvK8T3Btq96c6tZL4zq4Av5ijyYGZ3YIuW4
      PAWN_DB_URL: 
        mysql+mysqlconnector://user:Zp3Nr7Vc5KtQm8EyXw0LaJdRsUf6HgBo@pawndata.pccc/secondOrderPawn
