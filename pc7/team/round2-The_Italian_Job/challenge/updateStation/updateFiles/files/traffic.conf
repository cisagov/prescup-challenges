# BlueFlex-Switch-331 — Device Configuration (traffic cabinet)
# INI-style key/value. Lines beginning with # are comments.
# Location on device: /etc/blueflex/traffic.conf

[device]
model = BlueFlex-Switch-331
role = traffic_cabinet_switch
id_file = /etc/blueflex/device_id
version_file = /opt/blueflex/VERSION
serial_port = ttyS0
arch = armv7l

[network]
mgmt_iface = eth0
mgmt_addr = dhcp
ntp_servers = pool.ntp.org
dns = 1.1.1.1,8.8.8.8
timezone = UTC

[update]
channel = stable
staging_dir = /var/lib/blueflex/staging
backup_dir = /var/lib/blueflex/backup
lock_file = /run/blueflex-update.lock
hash_file = .hashes
hash_algo = sha256
install_script = update.sh
public_key = /etc/blueflex/update_pubkey.pem
require_signature = true
max_package_size = 25MB
install_user = root
install_umask = 022

[health]
liveness_cmd = /usr/bin/pgrep -f blueflex-agent
readiness_url = http://127.0.0.1:9080/healthz
readiness_timeout_s = 2
rollback_on_failure = true
rollback_window_s = 30

[logging]
level = INFO
log_file = /var/log/blueflex/update.log
syslog_tag = blueflex-update

[security]
fs_immutable = /boot,/sbin,/bin,/lib
fs_writable = /opt/blueflex,/var/lib/blueflex,/etc/blueflex
drop_caps = chown,setuid,setgid,net_raw

[webpanel]
ws_url = ws://127.0.0.1:7007/panel
pin_length = 4
