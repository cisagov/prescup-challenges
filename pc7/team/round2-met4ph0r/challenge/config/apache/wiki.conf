<VirtualHost *:80>
    ServerName m3t4ph0r
    DocumentRoot /ctf/wiki
    
    <Directory /ctf/wiki>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>
    
    # Allow access to images directory
    <Directory /ctf/wiki/images>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/wiki_error.log
    CustomLog ${APACHE_LOG_DIR}/wiki_access.log combined
</VirtualHost>
