<VirtualHost *:8081>
    ServerAdmin webmaster@m3t4ph0r
    DocumentRoot /var/www/blog
    ServerName m3t4ph0r

    <Directory /var/www/blog>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        
        # Allow PHP execution in uploads directory (intentional vulnerability)
        <FilesMatch "\.php$">
            SetHandler application/x-httpd-php
        </FilesMatch>
    </Directory>

    # Enable PHP execution in wp-content/uploads (intentional vulnerability)
    <Directory /var/www/blog/wp-content/uploads>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        <FilesMatch "\.php$">
            SetHandler application/x-httpd-php
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/blog_error.log
    CustomLog ${APACHE_LOG_DIR}/blog_access.log combined
</VirtualHost>
