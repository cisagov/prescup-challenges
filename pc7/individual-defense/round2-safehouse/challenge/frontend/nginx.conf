user  nginx;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    server {
        listen 3000;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Docker embedded DNS
        resolver 127.0.0.11 ipv6=off valid=10s;

        # Defer DNS resolution until request-time
        set $backend "http://datawarehouse.safehouse.local:5000";

        # error_page 502 = @portal_fallback;

        # location @portal_fallback {
        #  return 302 /portal;
        #}

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /health {
            proxy_pass $backend/health;
            proxy_intercept_errors off;
        }

        location /api/ {
            proxy_pass $backend;
            proxy_intercept_errors on;
        }

        location /portal/ {
            proxy_pass $backend;
            error_page 502 =200 /index.html;
            error_page 504 =200 /index.html;
        }

        location /artifacts/ {
            proxy_pass $backend;
            proxy_intercept_errors off;
        }
    }
}