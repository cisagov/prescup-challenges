# Single-worker nginx — the artifact server serves a handful of static
# files to one competitor. Default `worker_processes auto` would spawn
# one worker per host CPU regardless of the 128m container limit.
worker_processes 1;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 64;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 30;
    server_tokens   off;

    access_log /var/log/nginx/access.log;

    include /etc/nginx/conf.d/*.conf;
}
