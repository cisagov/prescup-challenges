error_log /var/log/nginx/error.log info;
worker_processes 1;

events { worker_connections 1024; }

http {
  sendfile on;
  resolver 127.0.0.11 ipv6=off valid=300s;

  server {
    listen 443 ssl;
    server_name webserver;

    # --- Certificates (LEAF ONLY here) ---
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Issuer/Root for stapling verify AND client-auth chain
    ssl_trusted_certificate /etc/nginx/ca/ca.crt;
    ssl_client_certificate  /etc/nginx/ca/ca.crt;
    ssl_verify_depth 2;

    # --- OCSP stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_file /etc/nginx/ocsp/ocsp.der;

    # --- mTLS: REQUIRE client cert at handshake ---
    ssl_verify_client on;

    # Keep behavior deterministic for checks
    ssl_protocols TLSv1.2;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://hpke_oracle:8081;
        proxy_read_timeout 10s;
        proxy_connect_timeout 2s;
    }
  }
}