defaults
{
    instances       = 60
    log_type        = FILE /dev/stdout
    log_on_success  = HOST PID
    log_on_failure  = HOST
}

service myservice
{
    type            = UNLISTED
    disable         = no
    socket_type     = stream
    protocol        = tcp
    wait            = no
    user            = nobody
    port            = 1337
    server          = /app/run_demo.sh
    per_source      = UNLIMITED
    cps             = 50 10
    instances       = 100
    only_from       = 0.0.0.0/0
}